services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locanto-services-web
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://locanto:locanto@postgres:5432/locanto_services
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: locanto-services-postgres
    environment:
      POSTGRES_USER: locanto
      POSTGRES_PASSWORD: locanto
      POSTGRES_DB: locanto_services
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: locanto-services-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
