apiVersion: v1
kind: Namespace
metadata:
  name: locanto-services
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: locanto-services-config
  namespace: locanto-services
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
---
apiVersion: v1
kind: Secret
metadata:
  name: locanto-services-secrets
  namespace: locanto-services
type: Opaque
stringData:
  DATABASE_URL: "postgresql://locanto:change-me@postgres:5432/locanto_services"
  REDIS_URL: "redis://redis:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locanto-services-web
  namespace: locanto-services
  labels:
    app: locanto-services-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: locanto-services-web
  template:
    metadata:
      labels:
        app: locanto-services-web
    spec:
      containers:
        - name: web
          image: ghcr.io/dpehect/locanto-services:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: locanto-services-config
            - secretRef:
                name: locanto-services-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: locanto-services-web
  namespace: locanto-services
spec:
  type: ClusterIP
  selector:
    app: locanto-services-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: locanto-services-web
  namespace: locanto-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: locanto-services-web
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: locanto-services-web
  namespace: locanto-services
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: locanto-services.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: locanto-services-web
                port:
                  number: 80
